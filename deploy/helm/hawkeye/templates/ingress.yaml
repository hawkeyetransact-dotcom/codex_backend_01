{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hawkeye
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: hawkeye-api, port: { number: 80 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: hawkeye-web, port: { number: 80 } }
    {{- end }}
{{- end }}
