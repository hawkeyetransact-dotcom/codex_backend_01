{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawkeye-api
  labels: { app: hawkeye-api }
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: hawkeye-api }
  template:
    metadata:
      labels: { app: hawkeye-api }
    spec:
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.global.registry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 3000 }
          env:
            {{- range $k, $v := .Values.api.env }}
            - { name: {{ $k }}, value: {{ $v | quote }} }
            {{- end }}
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: hawkeye-api
spec:
  type: {{ .Values.api.service.type }}
  selector: { app: hawkeye-api }
  ports:
    - { port: {{ .Values.api.service.port }}, targetPort: {{ .Values.api.service.targetPort }}, name: http }
{{- end }}
