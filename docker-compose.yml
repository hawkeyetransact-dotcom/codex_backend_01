version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: hawkeye-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: hawkeye_dev
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    container_name: hawkeye-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: hawkeye_marketplace
      POSTGRES_USER: hawkeye
      POSTGRES_PASSWORD: hawkeye
    volumes:
      - postgres_data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: hawkeye-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
      - '9600:9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: hawkeye-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: hawkeye
      MINIO_ROOT_PASSWORD: hawkeye123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

volumes:
  mongo_data:
  postgres_data:
  opensearch_data:
  minio_data:
