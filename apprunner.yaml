version: 1.0
runtime: nodejs18
build:
  commands:
    pre-build:
      - npm ci
    build:
      - echo "build step (none)"
run:
  command: node -r ./src/config/polyfills.cjs src/server.js
  network:
    port: 5000
  env:
    - name: NODE_ENV
      value: development
    - name: PORT
      value: "5000"
